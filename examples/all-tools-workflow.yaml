name: all-tools-workflow
description: Comprehensive example demonstrating all built-in tools

steps:
  # Step 1: Read environment variable
  - id: read_env
    name: Read Environment Variable
    tool:
      name: env
      input:
        name: "HOME"
    retry:
      kind: fixed
      max_retries: 2
      interval_ms: 500

  # Step 2: Fetch data using

  - id: fetch_data
    name: Fetch Sample Data
    tool:
      name: http
      input:
        url: "https://jsonplaceholder.typicode.com/posts/1"
        method: GET
    retry:
      kind: fixed
      max_retries: 3
      interval_ms: 1000

  # Step 3: Write data to file
  - id: write_data
    name: Write Data to File
    tool:
      name: file_write
      input:
        path: "/tmp/rustflow_example_data.json"
        content: "{{steps.fetch_data.output}}"
    depends_on:
      - fetch_data

  # Step 4: Execute shell command to check file
  - id: check_file
    name: Check File Content
    tool:
      name: shell
      input:
        command: "cat /tmp/rustflow_example_data.json | jq '.title'"
        timeout_secs: 10
    depends_on:
      - write_data

  # Step 5: Read file content
  - id: read_file
    name: Read File Content
    tool:
      name: file_read
      input:
        path: "/tmp/rustflow_example_data.json"
    depends_on:
      - write_data

  # Step 6: Analyze data using LLM
  - id: analyze_data
    name: Analyze Data
    llm:
      provider: ollama
      model: qwen3:8b
      prompt: "Please analyze the following JSON data, extract key information and generate a concise summary:\n{{steps.read_file.output}}"
      max_tokens: 500
      temperature: 0.3
    depends_on:
      - read_file

  # Step 7: Write analysis result to file
  - id: write_analysis
    name: Write Analysis Result
    tool:
      name: file_write
      input:
        path: "/tmp/rustflow_analysis.txt"
        content: "{{steps.analyze_data.output}}"
    depends_on:
      - analyze_data

  # Step 8: Sleep for a while
  - id: sleep
    name: Wait 2 Seconds
    tool:
      name: sleep
      input:
        ms: 2000
    depends_on:
      - write_analysis

  # Step 9: Final check
  - id: final_check
    name: Final Check
    tool:
      name: shell
      input:
        command: "ls -la /tmp/rustflow_*.{json,txt}"
        timeout_secs: 10
    depends_on:
      - sleep