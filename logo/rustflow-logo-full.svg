    <text font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="11" letter-spacing="2.5" y="39">
      <tspan class="a" opacity="0.6" x="112">AI AGENT RUNTIME</tspan>
    </text>
  </g>
