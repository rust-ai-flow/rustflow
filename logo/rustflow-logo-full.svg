<svg width="300" height="54" viewBox="0 0 300 54" xmlns="http://www.w3.org/2000/svg">
  <!-- RustFlow Logo — Full (Icon + Wordmark) -->
  <style>
    @media (prefers-color-scheme: dark) {
      .dk { fill: #E8E6DF; }
      .a { fill: #5DCAA5; }
      .a2 { fill: #5DCAA5; fill-opacity: 0.35; }
      .a3 { fill: #5DCAA5; fill-opacity: 0.55; }
    }
    @media (prefers-color-scheme: light) {
      .dk { fill: #1a1a1a; }
      .a { fill: #0F6E56; }
      .a2 { fill: #0F6E56; fill-opacity: 0.3; }
      .a3 { fill: #0F6E56; fill-opacity: 0.5; }
    }
  </style>
  <g transform="translate(2, 4)">
    <!-- Input streams -->
    <path class="a2" d="M0 9 L16 9 L24 18 L24 21 L16 13 L0 13 Z"/>
    <path class="a3" d="M0 19 L16 19 L24 22 L24 26 L16 25 L0 25 Z"/>
